# ⚠️  USE THE docker-compose.yaml AT THE PROJECT ROOT, NOT THIS FILE.
#
#    cd genai-sandbox/
#    make up
#
# This file is kept for reference only. The canonical compose file is:
#    genai-sandbox/docker-compose.yaml

# ------------------------------------------------------------------
# Shared environment variables loaded from .env in the project root
# ------------------------------------------------------------------
x-common-env: &common-env
  env_file:
    - ../.env

services:

  # ================================================================
  # Core sandbox container
  # ================================================================
  sandbox:
    build:
      context: ..               # project root
      dockerfile: docker/Dockerfile
    container_name: genai-sandbox
    <<: *common-env
    volumes:
      - ../data:/app/data                 # RAG documents
      - ../src:/app/src                   # user's custom scripts
      - ../config:/app/config             # stack.yaml / .env overrides
      - uv-cache:/root/.cache/uv          # persist uv cache across restarts
    ports:
      - "${API_PORT:-8000}:8000"          # FastAPI
      - "${UI_PORT:-8501}:8501"           # Streamlit
      - "${CHAINLIT_PORT:-8080}:8080"     # Chainlit
    depends_on:
      chroma:
        condition: service_healthy
    networks:
      - sandbox-net
    restart: unless-stopped

  # ================================================================
  # ChromaDB  (always on — used when VECTOR_DB=chroma)
  # ================================================================
  chroma:
    image: chromadb/chroma:0.5.3
    container_name: genai-chroma
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8200:8000"
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # Qdrant (optional — activated when VECTOR_DB=qdrant)
  # ================================================================
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: genai-qdrant
    profiles: ["qdrant"]          # only starts when --profile qdrant is passed
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - sandbox-net
    restart: unless-stopped

  # ================================================================
  # PGVector / Postgres (optional — activated when VECTOR_DB=pgvector)
  # ================================================================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: genai-pgvector
    profiles: ["pgvector"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sandbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sandbox}
      POSTGRES_DB: ${POSTGRES_DB:-sandbox_db}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sandbox-net
    restart: unless-stopped

volumes:
  uv-cache:
  chroma-data:
  qdrant-data:
  pgvector-data:

networks:
  sandbox-net:
    driver: bridge
