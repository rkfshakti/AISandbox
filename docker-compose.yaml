# =============================================================
#  GenAI Sandbox Wrapper — docker-compose.yaml  (project root)
# =============================================================
version: "3.9"

services:

  # ================================================================
  # Core sandbox container
  # ================================================================
  sandbox:
    build:
      context: .                        # genai-sandbox/ root
      dockerfile: docker/Dockerfile
    image: genai-sandbox:latest
    container_name: genai-sandbox
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data                # RAG documents  (hot-swappable)
      - ./src:/app/src                  # custom scripts (hot-reloaded)
      - ./config:/app/config            # stack.yaml overrides
      - uv-cache:/root/.cache/uv        # persistent uv cache
    ports:
      - "${API_PORT:-8000}:8000"        # FastAPI
      - "${UI_PORT:-8501}:8501"         # Streamlit
      - "${CHAINLIT_PORT:-8080}:8080"   # Chainlit
      - "${JUPYTER_PORT:-8888}:8888"    # Jupyter
    depends_on:
      chroma:
        condition: service_healthy
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ================================================================
  # ChromaDB  — always on (VECTOR_DB=chroma)
  # ================================================================
  chroma:
    image: chromadb/chroma:0.5.20
    container_name: genai-chroma
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8200:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # Qdrant — activate with:  docker compose --profile qdrant up
  # ================================================================
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: genai-qdrant
    profiles: ["qdrant"]
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - sandbox-net
    restart: unless-stopped

  # ================================================================
  # PGVector / Postgres — activate with:  --profile pgvector
  # ================================================================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: genai-pgvector
    profiles: ["pgvector"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sandbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sandbox}
      POSTGRES_DB: ${POSTGRES_DB:-sandbox_db}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sandbox-net
    restart: unless-stopped

  # ================================================================
  # Ollama — activate with:  --profile ollama
  # Pulls and serves local LLMs (llama3, mistral, qwen2.5, etc.)
  # ================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: genai-ollama
    profiles: ["ollama"]
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sandbox-net
    restart: unless-stopped

  # ================================================================
  # Milvus — activate with:  --profile milvus
  # ================================================================
  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: genai-milvus
    profiles: ["milvus"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
    networks:
      - sandbox-net
    restart: unless-stopped

volumes:
  uv-cache:
  chroma-data:
  qdrant-data:
  pgvector-data:
  ollama-models:
  milvus-data:

networks:
  sandbox-net:
    driver: bridge
